services:
  network-inspector:
    build:
      context: .
      dockerfile: Dockerfile
    image: network-inspector
    container_name: network-inspector
    environment:
      DISPLAY: ":99"
      ELECTRON_DISABLE_GPU: "1"
    command:
      - xvfb-run
      - --auto-servernum
      - --server-args=-screen 0 1400x900x24
      - npm
      - start
      - --
      - --no-sandbox
